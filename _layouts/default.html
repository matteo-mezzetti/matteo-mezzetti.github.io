<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title and page.title != "Home" %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" type="image/png" href="{{ '/favicon.png' | relative_url }}">
</head>
<body>

  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.97/build/spline-viewer.js"></script>
  <div class="spline-bg">
    <spline-viewer url="https://prod.spline.design/B2OeSYzPgtSy5vio/scene.splinecode" style="width:100%;height:100%;" id="spline-viewer"></spline-viewer>
  </div>
  <script>
    function hideSplineLogo() {
      var viewer = document.getElementById('spline-viewer');
      if (!viewer || !viewer.shadowRoot) { setTimeout(hideSplineLogo, 200); return; }
      var shadow = viewer.shadowRoot;
      var style = document.createElement('style');
      style.textContent = '#logo, a[href*="spline"], [class*="logo"], [id*="logo"] { display: none !important; opacity: 0 !important; } * { cursor: default !important; }';
      shadow.appendChild(style);
    }
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(hideSplineLogo, 800);
      document.querySelector('.spline-bg').addEventListener('wheel', function(e) {
        window.scrollBy({ top: e.deltaY, left: e.deltaX, behavior: 'auto' });
      }, { passive: true });
    });
  </script>

  <nav>
  <a href="{{ '/' | relative_url }}" class="site-title">
    <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="MM" height="28">
    </a>
    <div class="nav-links">
      <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Home</a>
      <a href="{{ '/about' | relative_url }}"{% if page.url contains 'about' %} class="active"{% endif %}>About</a>
      <a href="{{ '/projects' | relative_url }}"{% if page.url contains 'projects' %} class="active"{% endif %}>Projects</a>
      <a href="{{ '/blog' | relative_url }}"{% if page.url contains 'blog' %} class="active"{% endif %}>Blog</a>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>© {{ 'now' | date: "%Y" }} {{ site.author }} · Built with <a href="https://jekyllrb.com">Jekyll</a></p>
  </footer>

</body>
</html>
