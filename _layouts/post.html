---
layout: default
---
<article>
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
      {{ page.date | date: "%B %-d, %Y" }}
      {% if page.tags %}·
        {% for tag in page.tags %}<span class="tag" style="margin-left:0.25rem;">{{ tag }}</span>{% endfor %}
      {% endif %}
    </p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <a href="{{ '/blog' | relative_url }}" class="back-link">← Back to writing</a>
</article>
