---
layout: default
---
<article>
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
      {{ page.date | date: "%B %-d, %Y" }}
      {% if page.tags %}
        ·
        {% for tag in page.tags %}
          <span class="tag">{{ tag }}</span>
        {% endfor %}
      {% endif %}
    </p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <p style="margin-top: 3rem;"><a href="{{ '/blog' | relative_url }}">← Back to blog</a></p>
</article>
